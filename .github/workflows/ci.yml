name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The most-guarded job: nothing else runs unless determinism holds.
  determinism-gate:
    name: Determinism gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: Determinism gate + invariant proptests
        run: cargo test -p oracle-core --test determinism_gate --test proptests -- --nocapture

  build-test-lint:
    name: Build, test, clippy, fmt
    runs-on: ubuntu-latest
    needs: determinism-gate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
